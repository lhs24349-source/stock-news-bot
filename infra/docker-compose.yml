# 개발용 docker-compose (app + redis + postgres)
version: "3.9"

services:
  # ── FastAPI 백엔드 ──
  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: stock-news-app
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/stock_news
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ../backend/app:/app/app  # 핫 리로드용

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: stock-news-postgres
    environment:
      POSTGRES_DB: stock_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: stock-news-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
